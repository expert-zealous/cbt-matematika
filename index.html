<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Matematika V3 Stabil</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a1428,#1a2a4e,#2d1b2e);
  color:white;
}

/* START */
.start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}
.box{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:360px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.box img{width:150px;margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
  margin-top:10px;
}

/* HEADER */
.header{
  background:#dc2626;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 50px);}
.left{flex:1;padding:20px;}
.right{width:260px;padding:15px;}

.card{background:#f8fafc;color:black;padding:10px;border-radius:10px;}

.option{
  background:#f8fafc;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.option.active{background:#dc2626;color:white;}

.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.nav-box{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
}
.nav-box.done{background:#10b981;}
.nav-box.active{border:2px solid red;}

.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;}
.btn-submit{background:#10b981;color:white;}
.btn-disabled{background:gray !important;cursor:not-allowed;}

/* RESULT */
#hasil{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
  transform:scale(0.6);
  opacity:0;
  transition:0.6s;
}
#hasil.show{transform:scale(1);opacity:1;}

.result-container{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:40px;
}

.result-container > div{
  max-width:400px;
  width:100%;
}

.trophy{width:180px;animation:float 2s infinite;}
@keyframes float{
  50%{transform:translateY(-10px);}
}

.chart{display:flex;gap:40px;align-items:flex-end;height:220px;}
.bar-v{width:60px;border-radius:10px 10px 0 0;}
.label{margin-top:5px;}
.value{font-weight:bold;}
</style>
</head>

<body>

<canvas id="fireworks" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;"></canvas>

<div id="start" class="start">
<div class="box">
<img src="https://i.ibb.co/rG9kgRd3/LOGO-EZ-NO-Baground2.jpg">
<h2>TRY OUT MATEMATIKA</h2>
<input id="nama" placeholder="Nama">
<input id="token" placeholder="Token">
<button onclick="mulai()" style="background:red;color:white;width:100%;margin-top:15px;">Mulai</button>
</div>
</div>

<div id="quiz" style="display:none;flex-direction:column;">
<div class="header">
<div id="no"></div>
<div id="timer">60:00</div>
</div>

<div class="main">
<div class="left">
<div id="soal"></div>
<div id="opsi"></div>

<button id="btnFinish" class="btn btn-submit" onclick="finish()">Selesai</button>
</div>

<div class="right">
<div id="nav" class="nav"></div>
</div>
</div>
</div>

<div id="hasil"></div>

<script>
const TOKEN="EZ2026";
let finished=false;
let i=0;
let jawaban=new Array(25).fill(-1);

const soalData=Array.from({length:25},(_,i)=>({
 img:`img/soal${i+1}.png`,
 opsi:[
  `img/${i+1}a.png`,
  `img/${i+1}b.png`,
  `img/${i+1}c.png`,
  `img/${i+1}d.png`
 ]
}));

const kunci=[0,1,0,2,2,1,0,3,0,3,2,1,0,1,3,3,0,3,1,2,3,1,0,2,0];

let waktu=3600,interval;

function mulai(){
 const n=document.getElementById("nama").value;
 const t=document.getElementById("token").value;
 if(!n||t!==TOKEN){alert("Data salah");return;}

 if(document.documentElement.requestFullscreen){
  document.documentElement.requestFullscreen().catch(()=>{});
 }

 start.style.display="none";
 quiz.style.display="flex";

 buildNav(); tampil(); timer();
}

function tampil(){
 let q=soalData[i];
 no.innerText="Soal "+(i+1)+"/25";
 soal.innerHTML=`<img src="${q.img}" style="max-width:100%">`;
 opsi.innerHTML=q.opsi.map((o,x)=>
 `<div class="option ${jawaban[i]==x?'active':''}" onclick="pilih(${x})">
 <img src="${o}" style="max-height:80px"></div>`).join("");
 updateNav();
}

function pilih(x){jawaban[i]=x;tampil();}
function buildNav(){
 nav.innerHTML="";
 for(let x=0;x<25;x++){
  let d=document.createElement("div");
  d.className="nav-box";
  d.innerText=x+1;
  d.onclick=()=>{i=x;tampil();}
  nav.appendChild(d);
 }
}
function updateNav(){
 [...nav.children].forEach((d,x)=>{
  d.className="nav-box";
  if(jawaban[x]>=0)d.classList.add("done");
  if(x==i)d.classList.add("active");
 });
}

function timer(){
 interval=setInterval(()=>{
  waktu--;
  let m=Math.floor(waktu/60);
  let s=waktu%60;
  timerEl.innerText=`${m}:${s<10?'0':''}${s}`;
  if(waktu<=0)finish();
 },1000);
}
const timerEl=document.getElementById("timer");

function finish(){
 if(finished)return;
 finished=true;
 clearInterval(interval);

 let benar=0,salah=0,kosong=0;
 jawaban.forEach((a,x)=>{
  if(a==-1)kosong++;
  else if(a==kunci[x])benar++;
  else salah++;
 });

 let skor=Math.round(benar/25*100);

 let trophy="https://i.ibb.co/ccGh3v5s/epic-transparan.png";
 if(skor>=80) trophy="https://i.ibb.co/ShTKq8V/mitic-transparan.png";
 else if(skor>=60) trophy="https://i.ibb.co/7dnbNJGW/legend-transparan.png";

 quiz.style.display="none";
 hasil.style.display="flex";
 setTimeout(()=>hasil.classList.add("show"),100);

 hasil.innerHTML=`
 <div class="result-container">
  <img class="trophy" src="${trophy}">
  <div>
    <h1 style="font-size:40px;">${skor}</h1>
    <div class="chart">
      <div><div class="bar-v" style="height:${benar*8}px;background:lime"></div><div>${benar}</div></div>
      <div><div class="bar-v" style="height:${salah*8}px;background:red"></div><div>${salah}</div></div>
      <div><div class="bar-v" style="height:${kosong*8}px;background:white"></div><div>${kosong}</div></div>
    </div>
  </div>
 </div>`;
}
</script>

</body>
</html>
