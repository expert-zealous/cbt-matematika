<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Matematika V3 Premium</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a1428,#1a2a4e,#2d1b2e);
  color:white;
}

/* START */
.start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:360px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.box img{width:150px;margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
  margin-top:10px;
}

/* HEADER */
.header{
  background:#dc2626;
  padding:12px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 50px);}
.left{flex:1;padding:20px;}
.right{width:260px;padding:15px;}

.card{background:#f8fafc;color:black;padding:10px;border-radius:10px;}

.option{
  background:#f8fafc;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
}

/* aktif */
.option.active{
  background:#dc2626;
  border:2px solid #dc2626;
}

/* gambar normal (AMAN) */
.option img{
  max-height:80px;
  display:block;
}

/* NAV */
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}

.nav-box{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  background:#1e293b;
  border:1px solid #475569;
  cursor:pointer;
  font-weight:600;
}

.nav-box.done{background:#10b981;color:white;}
.nav-box.active{border:2px solid red;}

/* BUTTON */
.btn{
  padding:10px 18px;
  border-radius:10px;
  font-weight:600;
  border:none;
  cursor:pointer;
}

.btn-prev{background:white;color:black;}
.btn-next{background:#3b82f6;color:white;}
.btn-submit{background:#10b981;color:white;}
.btn-disabled{background:gray !important;cursor:not-allowed;}

/* RESULT */
#hasil{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  transform:scale(0.6);
  opacity:0;
  transition:all 0.6s ease;
}

#hasil.show{
  transform:scale(1);
  opacity:1;
}

.result-container{
  display:flex;
  align-items:center;
  gap:40px;
  flex-wrap:wrap;
}

.trophy{
  width:180px;
  animation:float 2s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0);}
}

/* BAR */
.chart{
  display:flex;
  gap:40px;
  align-items:flex-end;
  height:220px;
}

.bar-v{
  width:60px;
  border-radius:10px 10px 0 0;
}

.label{text-align:center;margin-top:8px;}
.value{text-align:center;font-weight:bold;}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="start">
<div class="box">
<img src="https://i.ibb.co.com/rG9kgRd3/LOGO-EZ-NO-Baground2.jpg">
<h2>TRY OUT AAF D MATEMATIKA 2026</h2>

<input id="nama" placeholder="Nama lengkap">
<input id="token" placeholder="Token ujian">

<button onclick="mulai()" style="background:red;color:white;width:100%;margin-top:15px;">
Mulai Ujian
</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none;flex-direction:column;">
<div class="header">
<div id="no"></div>
<div id="timer">60:00</div>
</div>

<div class="main">
<div class="left">
<div id="soal"></div>
<div id="opsi"></div>

<div style="margin-top:20px;display:flex;gap:10px;">
<button class="btn btn-prev" onclick="prev()">Sebelumnya</button>
<button class="btn btn-next" onclick="next()">Selanjutnya</button>
<button id="btnFinish" class="btn btn-submit" onclick="finish()">Selesai</button>
</div>
</div>

<div class="right">
<div id="nav" class="nav"></div>
</div>
</div>
</div>

<div id="hasil"></div>

<script>

// ================= CONFIG =================
const TOKEN="EZ2026";
const SHEET_URL="https://script.google.com/macros/s/AKfycbx-Li92VI_MPrWMjY1lJ5e4tuh4X4r6jDYhcrxqyxB7mAcxNcQD26Fmg_MOQ2UI8-BB/exec";

// ================= STATE =================
let namaPeserta="";
let finished=false;
let i=0;
let jawaban=new Array(25).fill(-1);

const soalData=Array.from({length:25},(_,i)=>({
 img:`img/soal${i+1}.PNG`,
 opsi:[`img/${i+1}a.PNG`,`img/${i+1}b.PNG`,`img/${i+1}c.PNG`,`img/${i+1}d.PNG`]
}));

const kunci=[0,1,0,2,2,1,0,3,0,3,2,1,0,1,3,3,0,3,1,2,3,1,0,2,0];

let waktu=3600;
let interval;

// ================= START =================
function mulai(){
 const namaInput=document.getElementById("nama");
 const tokenInput=document.getElementById("token");

 if(!namaInput.value || tokenInput.value!==TOKEN){
   alert("Data salah");
   return;
 }

 namaPeserta=namaInput.value;

 document.documentElement.requestFullscreen();
 document.getElementById("start").style.display="none";
 document.getElementById("quiz").style.display="flex";

 buildNav();
 tampil();
 timer();
}

// ================= SOAL =================
function tampil(){
 let q=soalData[i];
 document.getElementById("no").innerText="Soal "+(i+1)+"/25";

 document.getElementById("soal").innerHTML=
 `<div class="card">
   <img src="${q.img}" style="max-width:100%">
 </div>`;

 let html="";
 q.opsi.forEach((o,x)=>{
  html+=`<div class="option ${jawaban[i]==x?'active':''}" onclick="pilih(${x})">
  <img src="${o}" style="max-height:80px;">
  </div>`;
 });

 document.getElementById("opsi").innerHTML=html;
 updateNav();
}

function pilih(x){jawaban[i]=x;tampil();}
function next(){if(i<24)i++;tampil();}
function prev(){if(i>0)i--;tampil();}

// ================= NAV =================
function buildNav(){
 let nav=document.getElementById("nav");
 nav.innerHTML="";
 for(let x=0;x<25;x++){
  let d=document.createElement("div");
  d.className="nav-box";
  d.innerText=x+1;
  d.onclick=()=>{i=x;tampil();}
  nav.appendChild(d);
 }
}

function updateNav(){
 let nav=document.getElementById("nav").children;
 for(let x=0;x<25;x++){
  nav[x].className="nav-box";
  if(jawaban[x]>=0)nav[x].classList.add("done");
  if(x==i)nav[x].classList.add("active");
 }
}

// ================= TIMER =================
function timer(){
 interval=setInterval(()=>{
  waktu--;
  let m=Math.floor(waktu/60);
  let s=waktu%60;
  document.getElementById("timer").innerText=
  String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');
  if(waktu<=0) finish();
 },1000);
}

// ================= SHEET =================
function kirimHasil(benar,salah,kosong,skor){
 fetch(SHEET_URL,{
   method:"POST",
   body:JSON.stringify({
     nama:namaPeserta,
     benar, salah, kosong, skor
   })
 });
}

// ================= FINISH =================
function finish(){
 if(finished)return;
 finished=true;

 clearInterval(interval);

 let benar=0,salah=0,kosong=0;
 jawaban.forEach((a,x)=>{
  if(a==-1) kosong++;
  else if(a==kunci[x]) benar++;
  else salah++;
 });

 let skor=Math.round(benar/25*100);

 kirimHasil(benar,salah,kosong,skor);

 document.getElementById("quiz").style.display="none";
 let hasil=document.getElementById("hasil");
 hasil.style.display="flex";
 hasil.classList.add("show");

 hasil.innerHTML=`<h1 style="font-size:40px;">Nilai ${skor}</h1>`;
}

</script>

</body>
</html>
