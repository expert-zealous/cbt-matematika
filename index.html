<style>
.option{
  background:#f1f5f9;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  cursor:pointer;
  min-height:90px;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:all 0.2s ease;
}

/* hover biar terasa modern */
.option:hover{
  background:#e2e8f0;
}

/* saat dipilih */
.option.active{
  background:#dc2626;
  border:2px solid #dc2626;
}

/* 🔥 SOLUSI UTAMA: samarkan putih */
.option img{
  max-height:80px;
  display:block;
  margin:auto;
  background:transparent;
}

/* saat aktif → ubah warna gambar */
.option.active img{
  filter: brightness(0) invert(1);
}
</style>
