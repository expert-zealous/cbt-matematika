<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Matematika V3 FIX</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0a1428,#1a2a4e,#2d1b2e);
  color:white;
}

/* START */
.start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:40px;
  border-radius:20px;
  text-align:center;
  width:360px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.box img{width:150px;margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #444;
  background:#111;
  color:white;
  margin-top:10px;
}

/* HEADER */
.header{
  background:#dc2626;
  padding:12px;
  display:flex;
  justify-content:space-between;
  font-weight:600;
}

/* LAYOUT */
.main{display:flex;height:calc(100vh - 50px);}
.left{flex:1;padding:20px;}
.right{width:260px;padding:15px;}

.card{background:#f8fafc;color:black;padding:10px;border-radius:10px;}

.option{
  background:#f8fafc;
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  border:1px solid #cbd5e1;
  cursor:pointer;
}
.option.active{background:#dc2626;color:white;}

.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}

.nav-box{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:8px;
  background:#1e293b;
  border:1px solid #475569;
  cursor:pointer;
  font-weight:600;
}

.nav-box.done{background:#10b981;color:white;}
.nav-box.active{border:2px solid red;}

.btn{
  padding:10px 18px;
  border-radius:10px;
  font-weight:600;
  border:none;
  cursor:pointer;
}

.btn-prev{background:white;color:black;}
.btn-next{background:#3b82f6;color:white;}
.btn-submit{background:#10b981;color:white;}

/* RESULT */
#hasil{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}

.result-container{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  flex-wrap:wrap;
  width:100%;
}

/* 🔥 FIX HP */
@media (max-width:768px){
  .result-container{
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
  }
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="start">
<div class="box">
<img src="https://i.ibb.co.com/rG9kgRd3/LOGO-EZ-NO-Baground2.jpg">
<h2>TRY OUT MATEMATIKA</h2>

<input id="nama" placeholder="Nama lengkap">
<input id="token" placeholder="Token ujian">

<button onclick="mulai()" style="background:red;color:white;width:100%;margin-top:15px;">
Mulai Ujian
</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none;flex-direction:column;">
<div class="header">
<div id="no"></div>
<div id="timer">60:00</div>
</div>

<div class="main">
<div class="left">
<div id="soal"></div>
<div id="opsi"></div>

<div style="margin-top:20px;display:flex;gap:10px;">
<button class="btn btn-prev" onclick="prev()">Sebelumnya</button>
<button class="btn btn-next" onclick="next()">Selanjutnya</button>
<button class="btn btn-submit" onclick="finish()">Selesai</button>
</div>
</div>

<div class="right">
<div id="nav" class="nav"></div>
</div>
</div>
</div>

<div id="hasil"></div>

<script>

const TOKEN="EZ2026";

let i=0;
let jawaban=new Array(25).fill(-1);

const soalData = Array.from({length:25}, (_,i)=>({
  img:`img/soal${i+1}.png`,
  opsi:[
    `img/${i+1}a.png`,
    `img/${i+1}b.png`,
    `img/${i+1}c.png`,
    `img/${i+1}d.png`
  ]
}));

const kunci=[0,1,0,2,2,1,0,3,0,3,2,1,0,1,3,3,0,3,1,2,3,1,0,2,0];

let waktu=3600;
let interval;

function mulai(){
 if(!nama.value||token.value!==TOKEN) return alert("Data salah");

 document.documentElement.requestFullscreen().catch(()=>{});

 start.style.display="none";
 quiz.style.display="flex";

 buildNav();
 tampil();
 timer();
}

function tampil(){
 let q=soalData[i];

 no.innerText="Soal "+(i+1)+"/25";

 soal.innerHTML=`<div class="card">
   <img src="${q.img}" style="max-width:100%">
 </div>`;

 let html="";
 q.opsi.forEach((o,x)=>{
  html+=`<div class="option ${jawaban[i]==x?'active':''}" onclick="pilih(${x})">
    <img src="${o}" style="max-height:80px">
  </div>`;
 });

 opsi.innerHTML=html;
 updateNav();
}

function pilih(x){
 jawaban[i]=x;
 tampil();
}

function next(){ if(i<24){ i++; tampil(); } }
function prev(){ if(i>0){ i--; tampil(); } }

function buildNav(){
 nav.innerHTML="";
 for(let x=0;x<25;x++){
  let d=document.createElement("div");
  d.className="nav-box";
  d.innerText=x+1;
  d.onclick=()=>{ i=x; tampil(); };
  nav.appendChild(d);
 }
}

function updateNav(){
 let d=nav.children;
 for(let x=0;x<25;x++){
  d[x].className="nav-box";
  if(jawaban[x]>=0) d[x].classList.add("done");
  if(x==i) d[x].classList.add("active");
 }
}

function timer(){
 interval=setInterval(()=>{
  waktu--;
  let m=Math.floor(waktu/60);
  let s=waktu%60;
  document.getElementById("timer").innerText=
  String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

  if(waktu<=0) finish();
 },1000);
}

function finish(){

 clearInterval(interval);

 let benar=0;
 jawaban.forEach((a,x)=>{ if(a==kunci[x]) benar++; });

 let skor=Math.round(benar/25*100);

 quiz.style.display="none";
 hasil.style.display="flex";

 hasil.innerHTML=`
 <div class="result-container">
   <h1 style="font-size:40px;">Skor ${skor}</h1>
   <p>${benar}/25 benar</p>
 </div>
 `;
}

</script>

</body>
</html>
