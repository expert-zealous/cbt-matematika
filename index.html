<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT Matematika FIX FINAL</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* START */
.start{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  width:300px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* QUIZ */
.header{
  background:red;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.main{
  display:flex;
}

.left{flex:1;padding:20px;}
.right{width:200px;padding:10px;}

.option{
  background:white;
  color:black;
  margin-top:10px;
  padding:10px;
  cursor:pointer;
}

.option.active{
  background:red;
  color:white;
}

.nav-box{
  background:#334155;
  margin:3px;
  padding:8px;
  text-align:center;
  cursor:pointer;
}

/* HASIL */
#hasil{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  text-align:center;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="start">
<div class="box">
<h2>CBT MATEMATIKA</h2>
<input id="nama" placeholder="Nama">
<input id="token" placeholder="Token">
<button onclick="mulai()">Mulai</button>
</div>
</div>

<!-- QUIZ -->
<div id="quiz" style="display:none;">
<div class="header">
<div id="no"></div>
<div id="timer"></div>
</div>

<div class="main">
<div class="left">
<div id="soal"></div>
<div id="opsi"></div>

<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="finish()">Selesai</button>
</div>

<div class="right" id="nav"></div>
</div>
</div>

<!-- HASIL -->
<div id="hasil"></div>

<script>

const TOKEN="EZ2026";

// 🔥 GANTI DENGAN LINK APPS SCRIPT KAMU
const URL_KIRIM="https://script.google.com/macros/s/AKfycbx-Li92VI_MPrWMjY1lJ5e4tuh4X4r6jDYhcrxqyxB7mAcxNcQD26Fmg_MOQ2UI8-BB/exec";

let i=0;
let jawaban=new Array(25).fill(-1);

const soalData = Array.from({length:25},(_,i)=>({
  img:`img/soal${i+1}.png`,
  opsi:[
    `img/${i+1}a.png`,
    `img/${i+1}b.png`,
    `img/${i+1}c.png`,
    `img/${i+1}d.png`
  ]
}));

const kunci=[0,1,0,2,2,1,0,3,0,3,2,1,0,1,3,3,0,3,1,2,3,1,0,2,0];

let waktu=3600;
let interval;

// START
function mulai(){
 if(!nama.value||token.value!==TOKEN){
  alert("Data salah");
  return;
 }

 start.style.display="none";
 quiz.style.display="block";

 buildNav();
 tampil();
 timer();
}

// TAMPIL
function tampil(){
 let q=soalData[i];

 document.getElementById("no").innerText="Soal "+(i+1);

 // 🔥 CEK GAMBAR (ANTI ERROR)
 soal.innerHTML=`<img src="${q.img}" width="100%" onerror="this.src=''">`;

 let html="";
 q.opsi.forEach((o,x)=>{
  html+=`
  <div class="option ${jawaban[i]==x?'active':''}" onclick="pilih(${x})">
    <img src="${o}" height="60" onerror="this.src=''">
  </div>`;
 });

 opsi.innerHTML=html;
 updateNav();
}

// PILIH
function pilih(x){
 jawaban[i]=x;
 tampil();
}

// NAVIGASI
function next(){ if(i<24){i++; tampil();} }
function prev(){ if(i>0){i--; tampil();} }

// NAV BOX
function buildNav(){
 nav.innerHTML="";
 for(let x=0;x<25;x++){
  let d=document.createElement("div");
  d.className="nav-box";
  d.innerText=x+1;
  d.onclick=()=>{i=x; tampil();}
  nav.appendChild(d);
 }
}

function updateNav(){
 let d=nav.children;
 for(let x=0;x<25;x++){
  d[x].style.background = jawaban[x]>=0 ? "green" : "#334155";
 }
}

// TIMER
function timer(){
 interval=setInterval(()=>{
  waktu--;
  let m=Math.floor(waktu/60);
  let s=waktu%60;
  timer.innerText=m+":"+s;
  if(waktu<=0) finish();
 },1000);
}

// KIRIM
function kirim(nama, skor){
 fetch(URL_KIRIM,{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({nama,skor})
 });
}

// SELESAI
function finish(){
 clearInterval(interval);

 let benar=0;
 jawaban.forEach((a,x)=>{
  if(a==kunci[x]) benar++;
 });

 let skor=Math.round(benar/25*100);

 kirim(nama.value, skor);

 quiz.style.display="none";
 hasil.style.display="flex";

 hasil.innerHTML=`
 <div>
  <h1>SKOR ${skor}</h1>
  <p>${benar} BENAR</p>
 </div>
 `;
}

</script>

</body>
</html>
